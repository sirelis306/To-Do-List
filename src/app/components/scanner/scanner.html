<div class="scanner-overlay" (click)="onClose()"></div>
<div class="scanner-container">
  <div class="scanner-header">
    <h3>Escáner de Código de Barras</h3>
    <button class="close-btn" (click)="onClose()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  
  <div class="scanner-body">
    <div id="reader"></div>
    <p class="scanner-hint">
      <i class="fa-solid fa-circle-info"></i> 
      Usa la <strong>cámara de este dispositivo</strong> o conecta un <strong>escáner láser manual</strong> para leer el código.
    </p>
  </div>
  
  <div class="scanner-footer">
    <button class="cancel-btn" (click)="onClose()">Cancelar</button>
  </div>
</div>
