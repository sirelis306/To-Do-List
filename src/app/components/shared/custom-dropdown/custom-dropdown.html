<div class="custom-select-container" [class.dropup]="dropup">
  
  <button type="button" class="custom-btn" (click)="menuAbierto = !menuAbierto">
    <div class="btn-content">
      <i [class]="'fa-solid ' + icon"></i> 
      <span>{{ getNombreSeleccion() }}</span>
    </div>
    <i class="fa-solid fa-chevron-down arrow-icon" [class.rotated]="menuAbierto"></i>
  </button>
  
  @if (menuAbierto) {
    <div class="custom-menu">
      
      <button type="button" *ngIf="showClearOption" (click)="seleccionarOpcion('')">{{ label }}</button>
      
      @for (op of options; track op) {
        <button type="button" (click)="seleccionarOpcion(op, $event)" [class.multi-select-item]="multiSelect">
          <input type="checkbox" *ngIf="multiSelect" [checked]="isOptionSelected(op)" style="pointer-events: none;" />
          <span>{{ getLabel(op) }}</span>
        </button>
      }
    </div>
  }
</div>
