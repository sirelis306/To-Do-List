<div class="form-header">
  <h1>{{ tituloPagina }}</h1>
  <button class="return-btn" (click)="onRegresarClick()">
    <i class="fa-solid fa-arrow-left"></i>
    <span>Regresar a la lista</span>
  </button>
</div>

<form class="product-form" (ngSubmit)="onGuardar()" #productForm="ngForm">
  <h3>Detalles de producto</h3>

  <div class="form-row">
    <!-- <div class="input-group">
      <label for="codigo">ID del Producto</label> 
      <input id="codigo" type="text" [(ngModel)]="nuevoProducto.id" name="id" required>
    </div> -->
    <div class="input-group">
      <label for="nombre">Nombre del Producto</label>
      <input id="nombre" type="text" [(ngModel)]="nuevoProducto.nombre" name="nombre" required>
    </div>
    <div class="input-group">
      <label for="categoria">Categoría del Producto</label>
      <input id="categoria" type="text" [(ngModel)]="nuevoProducto.categoria" name="categoria" required>
    </div>
    <div class="input-group">
      <label for="serial">Serial</label>
      <input id="serial" type="number" [(ngModel)]="nuevoProducto.serial" name="serial" required>
    </div>
  </div>
  
  <div class="form-row">
    <div class="input-group">
      <label for="marca">Marca</label>
      <input id="marca" type="text" [(ngModel)]="nuevoProducto.marca" name="marca" required>
    </div>
    <div class="input-group">
        <label for="modelo">Modelo</label>
        <input id="modelo" type="text" [(ngModel)]="nuevoProducto.modelo" name="modelo" required>
    </div>
    <div class="input-group">
      <label for="caracteristicas">Características</label>
      <input id="caracteristicas" type="text" [(ngModel)]="nuevoProducto.caracteristicas" name="caracteristicas" required>
    </div>
  </div>

  <div class="form-row">
    <div class="input-group">
      <label for="color">Color</label> 
      <input id="color" type="text" [(ngModel)]="nuevoProducto.color" name="color" required>
    </div>
    <div class="input-group">
      <label for="condicion">Condición</label>
      <input id="condicion" type="text" [(ngModel)]="nuevoProducto.condicion" name="condicion" required>
    </div>
    <div class="input-group">
      <label for="locacion">Ubicación</label>
      <input id="locacion" type="text" [(ngModel)]="nuevoProducto.locacion" name="locacion" required>
    </div>
  </div>

  <div class="form-buttons">
    <button type="submit" class="save-btn" [disabled]="!productForm.valid">
      Guardar Producto
    </button>
  </div>

</form>
