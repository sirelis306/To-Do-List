<div class="admin-page">
  <div class="page-header">
    <div class="breadcrumb">
      <span class="root">Usuarios</span>
      <span class="separator">/</span>
      <span class="current">Crear Usuario</span>
    </div>
  </div>

  <div class="content-card">
    <form (submit)="onSubmit()" #userForm="ngForm" class="modern-form">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" [(ngModel)]="userData.nombre" required placeholder="Nombre">
        </div>
        <div class="form-group">
          <label>Apellido *</label>
          <input type="text" name="apellido" [(ngModel)]="userData.apellido" required placeholder="Apellido">
        </div>
        <div class="form-group full-width">
          <label>Correo Electrónico *</label>
          <input type="email" name="email" [(ngModel)]="userData.email" required placeholder="correo@ejemplo.com">
        </div>
      </div>

      <div class="roles-section">
        <label class="section-title">Roles</label>
        <div class="radio-group">
          <label *ngIf="isSuperAdmin" class="radio-label">
            <input type="radio" name="role" value="superadmin" [(ngModel)]="userData.role">
            <span class="radio-custom"></span> Super Admin
          </label>
          <label class="radio-label">
            <input type="radio" name="role" value="admin" [(ngModel)]="userData.role" [disabled]="!isSuperAdmin">
            <span class="radio-custom"></span> Administrador
          </label>
          <label class="radio-label">
            <input type="radio" name="role" value="regular" [(ngModel)]="userData.role">
            <span class="radio-custom"></span> Regular
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="action-btn back" routerLink="/user/users">
          Regresar <i class="fa-solid fa-house"></i>
        </button>
        <button type="submit" class="action-btn save" [disabled]="!userForm.form.valid">
          Guardar <i class="fa-solid fa-floppy-disk"></i>
        </button>
      </div>
    </form>
  </div>
</div>
