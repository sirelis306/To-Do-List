<div class="admin-page">
  <div class="page-header">
    <div class="breadcrumb">
      <span class="root">Inventario</span>
      <span class="separator">/</span>
      <span class="current">{{ tituloPagina }}</span>
    </div>
  </div>

  <div class="content-card">
    <form (ngSubmit)="onGuardar()" #productForm="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre del Producto</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-box"></i>
            <input type="text" [(ngModel)]="nuevoProducto.nombre" name="nombre" placeholder="Ej: Laptop" required
              [class.is-invalid]="submitted && !nuevoProducto.nombre">
          </div>
        </div>

        <div class="form-group">
          <label>Categoría</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-tags"></i>
            <input type="text" [(ngModel)]="nuevoProducto.categoria" name="categoria" placeholder="Ej: Electrónica"
              required [class.is-invalid]="submitted && !nuevoProducto.categoria">
          </div>
        </div>

        <div class="form-group">
          <label>Marca</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-copyright"></i>
            <input type="text" [(ngModel)]="nuevoProducto.marca" name="marca" placeholder="Ej: Apple" required
              [class.is-invalid]="submitted && !nuevoProducto.marca">
          </div>
        </div>

        <div class="form-group">
          <label>Modelo</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-code-branch"></i>
            <input type="text" [(ngModel)]="nuevoProducto.modelo" name="modelo" placeholder="Ej: MacBook Air" required
              [class.is-invalid]="submitted && !nuevoProducto.modelo">
          </div>
        </div>

        <div class="form-group">
          <label>Serial / Código</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-barcode"></i>
            <input type="text" [(ngModel)]="nuevoProducto.serial" name="serial" placeholder="Número de serie" required
              [class.is-invalid]="submitted && !nuevoProducto.serial">
          </div>
        </div>

        <div class="form-group">
          <label>Condición</label>
          <div class="form-custom-select" [class.is-invalid]="submitted && !nuevoProducto.condicion">
            <app-custom-dropdown 
              [options]="opcionesCondicion" 
              [selectedValue]="nuevoProducto.condicion || ''" 
              label="Seleccionar..."
              icon="fa-star"
              (valueChange)="nuevoProducto.condicion = $event">
            </app-custom-dropdown>
          </div>
        </div>

        <div class="form-group">
          <label>Color</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-palette"></i>
            <input type="text" [(ngModel)]="nuevoProducto.color" name="color" placeholder="Ej: Gris" required
              [class.is-invalid]="submitted && !nuevoProducto.color">
          </div>
        </div>

        <div class="form-group">
          <label>Ubicación</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" [(ngModel)]="nuevoProducto.locacion" name="locacion" placeholder="Ej: Logística"
              required [class.is-invalid]="submitted && !nuevoProducto.locacion">
          </div>
        </div>

        <div class="form-group">
          <label>Características</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-list-ul"></i>
            <input type="text" [(ngModel)]="nuevoProducto.caracteristicas" name="caracteristicas"
              placeholder="Ej: 16GB RAM, 512GB SSD" required [class.is-invalid]="submitted && !nuevoProducto.caracteristicas">
          </div>
        </div>

        <div class="form-group">
          <label>Cantidad</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-calculator"></i>
            <input type="number" [(ngModel)]="nuevoProducto.cantidad" name="cantidad" placeholder="Ej: 1">
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="action-btn back" (click)="onRegresarClick()">
          Regresar <i class="fa-solid fa-arrow-left"></i>
        </button>
        <button type="submit" class="action-btn save" [disabled]="isSaving">
          @if (!isSaving) {
            Guardar Producto <i class="fa-solid fa-check"></i>
          } @else {
            Guardando... <i class="fa-solid fa-spinner fa-spin"></i>
          }
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Modal de Éxito -->
@if (showSuccessModal) {
  <div class="confirm-modal-backdrop" (click)="onCloseSuccess()"></div>
  <div class="confirm-modal-content">
    <div class="modal-icon success">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h4>{{ modalTitle }}</h4>
    <p>{{ modalMessage }}</p>
    <div class="modal-actions">
      <button class="btn btn-success" (click)="onCloseSuccess()">Aceptar</button>
    </div>
  </div>
}

<!-- Modal de Error -->
@if (showErrorModal) {
  <div class="confirm-modal-backdrop" (click)="onCloseError()"></div>
  <div class="confirm-modal-content">
    <div class="modal-icon error">
      <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    <h4>{{ modalTitle }}</h4>
    <p>{{ modalMessage }}</p>
    <div class="modal-actions">
      <button class="btn btn-confirm" (click)="onCloseError()">Entendido</button>
    </div>
  </div>
}
