<div class="chat-window-header">
  <div class="user-info">
    <i class="fa-solid fa-user user-avatar"></i>
    <span class="user-name">Sara</span>
  </div>
  <div class="chat-actions">
    <i class="fa-solid fa-ellipsis-vertical"></i>
  </div>
</div>

<div class="message-area">
  @for (message of messages; track message.id) {
    <div class="message-row" [class.sent]="message.senderId === currentUserId">
      <div class="message-content">
        <p>{{ message.message }}</p>
        <span class="message-time">
          {{ message.timestamp | date:'shortTime' }}
          <span *ngIf="message.senderId === currentUserId" class="msg-actions">
            <i class="fa-solid fa-pen action-icon" (click)="onEditMessage(message)" title="Editar"></i>
            <i class="fa-solid fa-trash action-icon" (click)="onDeleteMessage(message.id)" title="Eliminar"></i>
          </span>
        </span>
      </div>
    </div>
  }
</div>

<div class="chat-input-area">
  <input type="text" placeholder="Message..." [(ngModel)]="newMessage" (keyup.enter)="onSendMessage()" />
  <button class="send-btn" (click)="onSendMessage()">
    <i class="fa-solid fa-paper-plane"></i>
  </button>
</div>
