<div class="modal-backdrop" (click)="closeModal.emit()"
  style="background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;">
  <div class="gcal-modal-content" (click)="$event.stopPropagation()">

    <!-- Cabecera simple -->
    <div class="gcal-header">
      <button class="gcal-close-btn" (click)="closeModal.emit()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="gcal-body">

      <!-- Título -->
      <div class="gcal-title-container">
        <input type="text" [(ngModel)]="title" placeholder="Agregar título" class="gcal-title-input" />
      </div>

      <!-- Píldoras de Categoría (Tipo de Evento) -->
      <div class="gcal-type-pills">
        <button class="gcal-pill" [class.active]="tipoEvento === 'evento'"
          (click)="tipoEvento = 'evento'">Evento</button>
        <button class="gcal-pill" [class.active]="tipoEvento === 'reunion'"
          (click)="tipoEvento = 'reunion'">Reunión</button>
        <button class="gcal-pill" [class.active]="tipoEvento === 'recordatorio'"
          (click)="tipoEvento = 'recordatorio'">Recordatorio</button>
      </div>

      <!-- Fecha y Hora -->
      <div class="gcal-row">
        <div class="gcal-icon-col">
          <i class="fa-regular fa-clock"></i>
        </div>
        <div class="gcal-content-col">
          <div class="gcal-inline-inputs" style="flex-wrap: nowrap;">
            <input type="date" [(ngModel)]="date" class="gcal-date-input" style="flex: 1; max-width: 140px;" />
            <input type="time" [(ngModel)]="startAt" class="gcal-time-input" style="flex: 1; max-width: 100px;" />
            <span>–</span>
            <input type="time" [(ngModel)]="endAt" class="gcal-time-input" style="flex: 1; max-width: 100px;" />
          </div>
        </div>
      </div>



      <!-- Visibilidad / Invitados -->
      <div class="gcal-row">
        <div class="gcal-icon-col">
          <i class="fa-solid fa-globe" *ngIf="isCompanyWide"></i>
          <i class="fa-solid fa-lock" *ngIf="!isCompanyWide"></i>
        </div>
        <div class="gcal-content-col">
          <div class="gcal-split-row" style="display: flex; gap: 15px;">
            <div class="gcal-split-item" [style.flex]="isCompanyWide ? '1' : '100%'">
              <app-custom-dropdown [options]="visibilityOptions" [selectedValue]="isCompanyWide"
                label="Visibilidad predeterminada" (valueChange)="isCompanyWide = $event" icon="fa-eye">
              </app-custom-dropdown>
            </div>
            <div class="gcal-split-item" *ngIf="isCompanyWide" style="flex: 1;">
              <app-custom-dropdown label="Agregar invitados" [options]="participantOptions" [multiSelect]="true"
                [selectedValues]="selectedParticipantIds" (toggleValue)="toggleParticipant($event.original)">
              </app-custom-dropdown>
            </div>
          </div>
          <div class="gcal-chips-container" *ngIf="isCompanyWide && selectedParticipantsList.length > 0" style="margin-top: 8px;">
            <span class="gcal-chip" *ngFor="let user of selectedParticipantsList">
              <i class="fa-regular fa-circle-user" style="color: #6366f1;"></i>
              {{ user.nombre }} {{ user.apellido }}
              <button class="gcal-chip-remove" (click)="removeParticipant(user.id)"><i
                  class="fa-solid fa-xmark"></i></button>
            </span>
          </div>
        </div>
      </div>

      <!-- Ubicación, Sala y Cliente -->
      <ng-container *ngIf="tipoEvento === 'reunion' || tipoEvento === 'evento'">
        <div class="gcal-row">
          <div class="gcal-icon-col">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="gcal-content-col">
            <div class="gcal-split-row">
              <div class="gcal-split-item">
                <app-custom-dropdown [options]="salaOptions" [selectedValue]="place" label="Agregar ubicación"
                  [showClearOption]="true" [dropup]="true" (valueChange)="place = $event">
                </app-custom-dropdown>
              </div>
              <div class="gcal-split-item">
                <app-custom-dropdown [options]="clientOptions" [selectedValue]="cliente" label="Agregar cliente"
                  [showClearOption]="true" [dropup]="true" (valueChange)="cliente = $event">
                </app-custom-dropdown>
              </div>
            </div>
          </div>
        </div>

        <div class="gcal-row" *ngIf="cliente === 'otro'">
          <div class="gcal-icon-col"></div>
          <div class="gcal-content-col">
            <div class="gcal-split-row">
              <div class="gcal-split-item">
                <input type="text" [(ngModel)]="clienteOtro" class="gcal-date-input"
                  style="width: 100%; border-bottom: 1px solid #dadce0;" placeholder="Especificar cliente" />
              </div>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Fila 📝: Descripción -->
      <div class="gcal-row">
        <div class="gcal-icon-col">
          <i class="fa-solid fa-align-left"></i>
        </div>
        <div class="gcal-content-col">
          <textarea [(ngModel)]="description" class="gcal-textarea"
            placeholder="Agregar descripción o archivos adjuntos"></textarea>
        </div>
      </div>

      <!-- Fila 🏷️: Etiqueta de Color -->
      <div class="gcal-row">
        <div class="gcal-icon-col">
          <i class="fa-solid fa-tag"></i>
        </div>
        <div class="gcal-content-col">
          <div class="gcal-colors-container">
            <div class="gcal-color-circle" *ngFor="let cat of colorCategories" [style.backgroundColor]="cat.color"
              [class.selected]="selectedColorHex === cat.color" (click)="selectedColorHex = cat.color" [title]="cat.name">
            </div>
          </div>
        </div>
      </div>


    </div>

    <!-- Mensaje de Error de Validación -->
    <div *ngIf="errorMessage" class="gcal-error-message" style="color: #ef4444; font-size: 0.85rem; padding: 0 24px; margin-top: -10px; margin-bottom: 10px;">
      <i class="fa-solid fa-circle-exclamation" style="margin-right: 5px;"></i> {{ errorMessage }}
    </div>

    <div class="gcal-footer">
      <button class="gcal-btn-save" (click)="saveEvent()">Guardar</button>
    </div>
  </div>
</div>
