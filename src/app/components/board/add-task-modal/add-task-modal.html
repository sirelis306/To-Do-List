<div class="modal-backdrop" (click)="onCerrar()">
  <div class="modal-content" (click)="$event.stopPropagation()" style="text-align: left; padding: 2rem;">

    <h3 style="text-align: center; margin-bottom: 20px;">Nueva Tarea</h3>

    <div class="form-group" style="width: 100%; margin-bottom: 15px;">
      <input class="form-control" type="text" placeholder="¿Qué necesitas hacer?" [(ngModel)]="nuevaTareaTitulo"/>
    </div>

    <div class="nueva-tarea-form" style="width: 100%;">
      <app-category-autocomplete 
        (categoriaSeleccionada)="onCategoriaCambia($event)">
      </app-category-autocomplete>
    </div>

   <div class="nueva-tarea-form" style="width: 100%; margin-bottom: 20px;">
      <app-custom-dropdown
        label="Importancia"
        [options]="opcionesImportancia"
        [selectedValue]="nuevaTareaImportancia"
        (valueChange)="onImportanciaChange($event)"
      ></app-custom-dropdown>
    </div>

    <div class="subtasks-section" style="width: 100%;">
      <h3 style="font-size: 1rem; color: #475569;">Sub-tareas ({{ subtareasCompletadas }}/{{ totalSubtareas }})</h3>
      
      <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input class="form-control" type="text" placeholder="Añadir sub-tarea..." [(ngModel)]="nuevoSubtareaDescripcion" (keyup.enter)="agregarSubtarea()"/>
        <button class="btn btn-primary" style="flex: 0 0 50px; padding: 0;" (click)="agregarSubtarea()">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <div class="subtask-list" style="margin-bottom: 20px; max-height: 150px; overflow-y: auto;">
        @for (subtarea of nuevasSubtareas; track $index) {
          <div class="subtask-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8fafc; border-radius: 8px; margin-bottom: 5px;">
            <span class="subtask-label">{{ subtarea }}</span>
            <button class="btn btn-danger" style="flex: 0 0 auto; padding: 5px 10px;" (click)="eliminarSubtarea($index)">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        }
      </div>

      <div class="modal-actions" style="margin-top: 20px;">
        <button class="btn btn-cancel" style="flex: 1;" (click)="onCerrar()">Cancelar</button>
        <button class="btn btn-primary" style="flex: 1;" (click)="onAgregarTarea()">Añadir Tarea</button>
      </div>
    </div>
  </div>
</div>
